<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Atlas Bucket Manager">
    <meta name="theme-color" content="#f43f5e">
    
    <title>Login | Atlas Manager</title>
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://code.iconify.design">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (built) -->
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js" defer></script>
    
    <!-- Theme detection -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-surface-base dark:bg-dark-950 text-text-primary dark:text-text-darkPrimary min-h-screen flex flex-col font-sans theme-transition">
    
    <!-- Nav -->
    <nav class="p-5 flex justify-end items-center gap-3">
        <div id="langSelectorContainer" role="listbox" aria-label="Select language"></div>
        <button 
            id="themeToggle" 
            class="size-8 flex items-center justify-center rounded-lg hover:bg-surface-raised dark:hover:bg-white/[0.08] transition-colors text-text-secondary dark:text-white/60"
            aria-label="Toggle dark mode">
            <iconify-icon icon="ph:moon-bold" class="dark:hidden" width="18" aria-hidden="true"></iconify-icon>
            <iconify-icon icon="ph:sun-bold" class="hidden dark:block text-amber-400" width="18" aria-hidden="true"></iconify-icon>
        </button>
    </nav>

    <!-- Login Form -->
    <div class="w-full flex-grow flex items-center justify-center p-4 -mt-12">
        <login-form id="loginFormComponent" class="flex w-full items-center justify-center"></login-form>
    </div>

    <!-- Support Button -->
    <div id="supportButtonContainer"></div>

    <!-- Version Badge -->
    <app-version version="{{APP_VERSION}}"></app-version>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transform transition-all duration-500 translate-y-20 opacity-0" role="alert" aria-live="assertive">
        <div class="bg-white dark:bg-[#1c1c1e] border border-border-light dark:border-white/[0.08] px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3">
            <div id="toastIcon" aria-hidden="true"></div>
            <span id="toastMessage" class="text-sm font-medium text-text-primary dark:text-white tracking-tight"></span>
        </div>
    </div>

    <!-- Lit Components (REQUIRED) -->
    <script type="module" src="/js/main.js"></script>
    
    <!-- App Orchestrator -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
