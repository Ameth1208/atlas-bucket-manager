<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Atlas Bucket Manager - Multi-cloud storage management for S3-compatible providers">
    <meta name="theme-color" content="#f43f5e">
    <meta name="author" content="Ameth Galarcio">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Atlas Bucket Manager">
    <meta property="og:description" content="Multi-cloud storage management for S3-compatible providers">
    <meta property="og:type" content="website">
    
    <title>Atlas Manager</title>
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://code.iconify.design">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="https://api.iconify.design/simple-icons:minio.svg?color=%23f43f5e">
    
    <!-- Tailwind CSS (built, not CDN) -->
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- Plyr.js - Media Player -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js" defer></script>
    
    <!-- Theme detection -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-[#fcfcfd] dark:bg-dark-950 text-slate-800 dark:text-slate-200 theme-transition min-h-screen flex flex-col font-sans">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-dark-900 border-b border-slate-200 dark:border-dark-800 sticky top-0 z-40" role="navigation" aria-label="Main navigation">
        <div class="container mx-auto px-4 md:px-6 py-3.5 flex justify-between items-center">
            <!-- Logo -->
            <button 
                class="flex items-center gap-2.5 cursor-pointer hover:opacity-80 transition-opacity" 
                onclick="window.location.hash = ''"
                aria-label="Go to home">
                <div class="bg-rose-500 p-2 rounded-xl text-white flex items-center justify-center">
                    <iconify-icon icon="ph:globe-hemisphere-west-duotone" width="22" aria-hidden="true"></iconify-icon>
                </div>
                <div class="hidden sm:flex flex-col">
                    <span class="text-base font-bold dark:text-white leading-tight">Atlas</span>
                    <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Manager</span>
                </div>
            </button>

            <!-- Desktop Search -->
            <div class="flex-grow max-w-md mx-4 relative hidden md:block">
                <label for="globalSearchInput" class="sr-only">Global search</label>
                <iconify-icon icon="ph:magnifying-glass-bold" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" width="18" aria-hidden="true"></iconify-icon>
                <input 
                    type="text" 
                    id="globalSearchInput" 
                    placeholder="Global search objects..." 
                    class="w-full bg-slate-100 dark:bg-dark-800 border-none rounded-xl pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-rose-500/20 transition-all outline-none text-slate-700 dark:text-slate-200"
                    aria-label="Search for objects across all buckets">
                <div id="searchResults" class="absolute top-full left-0 right-0 mt-2 bg-white dark:bg-dark-800 rounded-xl shadow-2xl border border-slate-200 dark:border-dark-700 hidden max-h-96 overflow-y-auto z-50 p-2" role="listbox"></div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-2 md:gap-5">
                <!-- Mobile Search Button -->
                <button 
                    id="mobileSearchBtn" 
                    class="md:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-dark-800 transition-colors"
                    aria-label="Open search">
                    <iconify-icon icon="ph:magnifying-glass-bold" width="20"></iconify-icon>
                </button>
                
                <!-- Language Selector -->
                <div id="langSelectorContainer" role="listbox" aria-label="Select language"></div>
                
                <!-- Theme Toggle -->
                <button 
                    id="themeToggle" 
                    class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-dark-800 transition-colors"
                    aria-label="Toggle dark mode">
                    <iconify-icon icon="ph:moon-bold" class="dark:hidden" width="20" aria-hidden="true"></iconify-icon>
                    <iconify-icon icon="ph:sun-bold" class="hidden dark:block text-yellow-400" width="20" aria-hidden="true"></iconify-icon>
                </button>
                
                <!-- Logout -->
                <button 
                    id="logoutBtn" 
                    class="text-xs font-bold uppercase tracking-wider hover:text-rose-500" 
                    data-i18n="logout"
                    aria-label="Logout">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Mobile Search Modal -->
    <div id="mobileSearchModal" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm md:hidden">
        <div class="bg-white dark:bg-dark-900 h-full flex flex-col">
            <div class="p-4 border-b border-slate-200 dark:border-dark-800 flex items-center gap-3">
                <button 
                    id="closeMobileSearch" 
                    class="p-2 hover:bg-slate-100 dark:hover:bg-dark-800 rounded-lg transition-colors"
                    aria-label="Close search">
                    <iconify-icon icon="ph:x-bold" width="20"></iconify-icon>
                </button>
                <label for="mobileSearchInput" class="sr-only">Search objects</label>
                <input 
                    type="text" 
                    id="mobileSearchInput" 
                    placeholder="Search objects..." 
                    class="flex-1 bg-slate-100 dark:bg-dark-800 border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-rose-500/20 transition-all outline-none text-slate-700 dark:text-slate-200"
                    aria-label="Search for objects">
            </div>
            <div id="mobileSearchResults" class="flex-1 overflow-y-auto p-4" role="listbox"></div>
        </div>
    </div>

    <main id="mainContent" class="container mx-auto px-4 md:px-6 py-10 flex-grow max-w-6xl" role="main">
        <!-- Bucket List View -->
        <div id="bucketListView">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
                <div>
                    <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-1" data-i18n="title">Storage Buckets</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm" data-i18n="subtitle">Manage visibility and lifecycle.</p>
                </div>
                <form id="createBucketForm" class="w-full lg:w-auto flex bg-white dark:bg-dark-900 rounded-xl border border-slate-200 dark:border-dark-800 p-1 focus-within:border-rose-500/50 shadow-sm gap-1" aria-label="Create new bucket">
                    <label for="createProviderId" class="sr-only">Select provider</label>
                    <select 
                        id="createProviderId" 
                        class="bg-slate-50 dark:bg-dark-800 text-slate-700 dark:text-slate-300 text-xs font-bold px-3 py-2 rounded-lg outline-none border-none"
                        aria-label="Provider for new bucket">
                    </select>
                    <label for="newBucketName" class="sr-only">Bucket name</label>
                    <input 
                        type="text" 
                        id="newBucketName" 
                        placeholder="bucket-name" 
                        required 
                        class="bg-transparent text-slate-900 dark:text-white w-full lg:w-48 px-4 py-2 focus:outline-none font-mono text-sm"
                        aria-label="Enter bucket name">
                    <button 
                        type="submit" 
                        class="bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold uppercase px-5 py-2 rounded-lg transition-all active:scale-95 shadow-lg shadow-rose-600/10" 
                        data-i18n="create">Create</button>
                </form>
            </div>

            <!-- Provider Filters -->
            <div id="filterContainer" class="flex flex-wrap items-center gap-2 mb-10" role="group" aria-label="Filter buckets by provider">
            </div>

            <div id="loader" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" aria-live="polite" aria-busy="true"><div class="bg-white dark:bg-dark-900 h-40 rounded-xl border border-slate-100 dark:border-dark-800 animate-pulse"></div><div class="bg-white dark:bg-dark-900 h-40 rounded-xl border border-slate-100 dark:border-dark-800 animate-pulse"></div><div class="bg-white dark:bg-dark-900 h-40 rounded-xl border border-slate-100 dark:border-dark-800 animate-pulse"></div></div>
            <div id="bucketList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden" role="list" aria-label="Bucket list"></div>
            <div id="emptyState" class="hidden flex flex-col items-center justify-center py-24 text-center border border-dashed border-slate-200 dark:border-dark-800 rounded-3xl">
                <iconify-icon icon="ph:cube-transparent-thin" width="64" class="text-slate-300 dark:text-slate-700 mb-4" aria-hidden="true"></iconify-icon>
                <h3 class="text-lg font-bold" data-i18n="emptyTitle">No buckets</h3>
            </div>
        </div>

        <!-- Explorer View -->
        <div id="explorerView" class="hidden animate-fade-in h-[calc(100vh-220px)]">
            <div class="bg-white dark:bg-dark-900 w-full h-full rounded-2xl shadow-sm border border-slate-200 dark:border-dark-800 flex flex-col overflow-hidden">
                <!-- Explorer Header -->
                <div id="explorerHeaderContainer"></div>
                
                <!-- File List -->
                <div class="flex-grow p-4 overflow-y-auto scroll-smooth" id="fileList" role="region" aria-label="File explorer"></div>
                
                <!-- Footer with Pagination -->
                <div id="explorerFooter" class="border-t border-slate-100 dark:border-dark-800 bg-white dark:bg-dark-900">
                    <!-- Pagination will be injected here dynamically -->
                </div>
            </div>
        </div>
    </main>

    <!-- Lit Web Components Modals -->
    <preview-modal id="previewModalComponent" role="dialog" aria-modal="true"></preview-modal>
    <delete-modal id="deleteModalComponent" role="dialog" aria-modal="true"></delete-modal>
    <folder-modal id="folderModalComponent" role="dialog" aria-modal="true"></folder-modal>
    <share-modal id="shareModalComponent" role="dialog" aria-modal="true"></share-modal>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] transform transition-all duration-500 translate-y-20 opacity-0" role="alert" aria-live="assertive">
        <div class="bg-white dark:bg-dark-800 border border-slate-200 dark:border-dark-700 px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3">
            <div id="toastIcon" aria-hidden="true"></div>
            <span id="toastMessage" class="text-sm font-bold text-slate-700 dark:text-slate-200 tracking-tight"></span>
        </div>
    </div>

     <!-- Support Button -->
    <div id="supportButtonContainer"></div>

    <!-- Plyr.js Script -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <!-- PDF.js Script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Lit Web Components (REQUIRED) -->
    <script type="module" src="/js/main.js"></script>

    <!-- Main app orchestrator -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
