# Docker Compose - Multiple Instances with Different Ports
# Usage: docker-compose -f docker-compose.multi.yml up -d

services:
  # Instance 1 - Port 3001
  atlas-app-1:
    image: atlas-bucket-manager:latest
    container_name: atlas-app-1
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ADMIN_USER=${ADMIN_USER_1:-admin}
      - ADMIN_PASS=${ADMIN_PASS_1:-admin123}
      # MinIO Provider
      - MINIO_ENDPOINT=${MINIO_ENDPOINT_1:-minio-server}
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY_1:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY_1:-minioadmin}
    networks:
      - atlas-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Instance 2 - Port 3002
  atlas-app-2:
    image: atlas-bucket-manager:latest
    container_name: atlas-app-2
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - ADMIN_USER=${ADMIN_USER_2:-admin}
      - ADMIN_PASS=${ADMIN_PASS_2:-admin456}
      # AWS S3 Provider
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    networks:
      - atlas-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Instance 3 - Port 8080
  atlas-app-3:
    image: atlas-bucket-manager:latest
    container_name: atlas-app-3
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - ADMIN_USER=${ADMIN_USER_3:-admin}
      - ADMIN_PASS=${ADMIN_PASS_3:-admin789}
      # Cloudflare R2 Provider
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
    networks:
      - atlas-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  atlas-net:
    driver: bridge
